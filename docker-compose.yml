services:
  # ─── PostgreSQL ──────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: blog_content
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Backend API (NestJS) ───────────────────────────
  api:
    build:
      context: ../blog-content
      target: development
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/blog_content
      DIRECT_URL: postgresql://postgres:postgres@db:5432/blog_content
      JWT_SECRET: blog-content-secret-key
      PORT: "3001"
    ports:
      - "3001:3001"
    volumes:
      - ../blog-content:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && npm run start:dev"

  # ─── Frontend (Next.js) ────────────────────────────
  web:
    build:
      context: .
      target: development
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api

volumes:
  pgdata:
